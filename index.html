<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GD: Mobile Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; background: #0a001a; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(10, 0, 30, 0.85); backdrop-filter: blur(8px); color: #fff; z-index: 20; }
        button { padding: 15px 40px; font-size: 24px; cursor: pointer; background: #ff00ff; border: none; color: white; border-radius: 10px; box-shadow: 0 0 15px #ff00ff; text-transform: uppercase; margin: 10px; }
        #ui-bar { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: white; font-size: 18px; text-shadow: 0 0 10px #ff00ff; pointer-events: none; z-index: 10; }
        .skin-select { display: flex; gap: 15px; margin-top: 20px; }
        .skin-box { width: 45px; height: 45px; border: 2px solid white; border-radius: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ui-bar">
            <span id="lvl-num">LEVEL 1</span>
            <span id="prog-val">0%</span>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 30px; color: #00ff00; text-align: center;">NEON DASH<br>MOBILE</h1>
            <button onclick="startGame()">PLAY</button>
            <div class="skin-select">
                <div class="skin-box" style="background: #00ff00;" onclick="setSkin('#00ff00')"></div>
                <div class="skin-box" style="background: #00ffff;" onclick="setSkin('#00ffff')"></div>
                <div class="skin-box" style="background: #ff00ff;" onclick="setSkin('#ff00ff')"></div>
            </div>
        </div>

        <div id="pause-screen" class="overlay hidden">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">RESUME</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- АДАПТИВНОСТЬ ПОД ЭКРАН ТЕЛЕФОНА ---
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    player.ground = canvas.height - 60;
}
window.addEventListener('resize', resize);

let isRunning = false, isPaused = false, cameraX = 0, currentLvl = 0;
const player = { 
    x: 80, y: 0, w: 40, h: 40, 
    dy: 0, g: 0.8, jump: 15, 
    rot: 0, grounded: false, 
    color: '#00ff00',
    ground: 0 
};

resize();

// --- ЗВУК ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration, vol = 0.1) {
    if (audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
}

// --- УРОВНИ ---
const levels = Array.from({length: 10}, (_, i) => ({
    speed: 5 + i,
    length: 5000 + i * 2000,
    obstacles: Array.from({length: 40}, (_, j) => ({
        x: 600 + j * 350,
        y: Math.random() > 0.6 ? player.ground - 80 : player.ground - 40,
        type: Math.random() > 0.4 ? 'block' : 'spike'
    }))
}));

function setSkin(color) { player.color = color; }

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('start-screen').classList.add('hidden');
    isRunning = true; isPaused = false; cameraX = 0; 
    player.y = player.ground - player.h;
    requestAnimationFrame(update);
}

function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pause-screen').classList.toggle('hidden', !isPaused);
    if (!isPaused) requestAnimationFrame(update);
}

// --- УПРАВЛЕНИЕ (КЛАВИАТУРА + ТАЧ) ---
function doJump() {
    if (player.grounded && isRunning && !isPaused) {
        player.dy = -player.jump;
        player.grounded = false;
        playSound(400, 'triangle', 0.1);
    }
}

window.addEventListener('keydown', e => { if(e.code === 'Space') doJump(); if(e.code === 'Escape') togglePause(); });
window.addEventListener('touchstart', (e) => { 
    if (e.target.tagName !== 'BUTTON') doJump(); 
}, { passive: false });

function update() {
    if (!isRunning || isPaused) return;

    let lvl = levels[currentLvl];
    cameraX += lvl.speed;

    // Отрисовка
    ctx.fillStyle = "#050010"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Физика
    player.dy += player.g; player.y += player.dy;
    if (player.y + player.h > player.ground) { 
        player.y = player.ground - player.h; 
        player.dy = 0; player.grounded = true; 
        player.rot = 0; 
    } else {
        player.rot += 0.15;
    }

    // Пол
    ctx.fillStyle = "#00ffff"; ctx.fillRect(0, player.ground, canvas.width, 4);

    // Препятствия
    lvl.obstacles.forEach(o => {
        let sx = o.x - cameraX + 100;
        if (sx < -100 || sx > canvas.width + 100) return;

        ctx.shadowBlur = 10; ctx.shadowColor = "#ff00ff";
        if (o.type === 'block') {
            ctx.fillStyle = "#bc00ff"; ctx.fillRect(sx, o.y, 40, 40);
            if (player.x < sx+40 && player.x+player.w > sx && player.y+player.h > o.y && player.y < o.y+40) {
                // Если врезался сбоку
                if (player.y + player.h > o.y + 10) die();
                else { player.y = o.y - player.h; player.dy = 0; player.grounded = true; }
            }
        } else {
            ctx.fillStyle = "#ff00ff"; ctx.beginPath();
            ctx.moveTo(sx, o.y+40); ctx.lineTo(sx+20, o.y); ctx.lineTo(sx+40, o.y+40); ctx.fill();
            if (player.x < sx+30 && player.x+player.w > sx+10 && player.y+player.h > o.y+10) die();
        }
    });

    // Кубик
    ctx.save(); ctx.translate(player.x + player.w/2, player.y + player.h/2); ctx.rotate(player.rot);
    ctx.shadowBlur = 15; ctx.shadowColor = player.color; ctx.fillStyle = player.color;
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h); ctx.restore(); ctx.shadowBlur = 0;

    document.getElementById('prog-val').innerText = Math.floor((cameraX/lvl.length)*100) + "%";
    document.getElementById('lvl-num').innerText = "LVL " + (currentLvl + 1);

    if (cameraX < lvl.length) requestAnimationFrame(update);
    else { currentLvl++; cameraX = 0; startGame(); }
}

function die() {
    playSound(100, 'sawtooth', 0.3, 0.2);
    isRunning = false; 
    document.getElementById('start-screen').classList.remove('hidden');
}
</script>
</body>
</html>
